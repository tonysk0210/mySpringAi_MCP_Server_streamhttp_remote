spring.application.name=mySpringAi_MCP_Server_stdio
################ H2 Database 相關設定 ################
# AUTO_SERVER=true 多個連線同時存取同一個 H2 檔案 Spring Boot app + H2 Console + DataGrip
spring.datasource.url=jdbc:h2:file:./h2db/chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# 啟用 H2 Console
spring.h2.console.enabled=true
################ JPA/Hibernate 相關設定 ################
# Hibernate 啟動時根據 JPA Entity 嘗試更新資料表結構；通常會保留既有資料，但不適合取代正式 migration。
spring.jpa.hibernate.ddl-auto=update